<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>MY BEAUTIFUL - Koleksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(128, 0, 255, 0.22);
            --border-primary: #b77eff;
            --btn-grad-1: #b77eff;
            --btn-grad-2: #0a84ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 100%; scroll-behavior: smooth; touch-action: pan-x pan-y; }
        body { min-height: 100vh; background: #000000; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; color: white; padding: 2rem 1.5rem; position: relative; overflow-x: hidden; touch-action: pan-x pan-y; }
        @media (max-width: 768px) { body { padding: 1rem; } }

        .hero-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 90%; max-width: 900px; height: 450px; background: radial-gradient(ellipse at center, var(--glow-color), rgba(0,0,0,0) 75%); pointer-events: none; z-index: 0; filter: blur(45px); transition: background 0.5s ease; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(1px 1px at 15% 25%, #ffffff0c, transparent), radial-gradient(1.2px 1.2px at 78% 65%, #b77eff12, transparent); background-size: 280px 280px, 320px 320px; background-repeat: repeat; opacity: 0.4; z-index: 0; }
        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; width: 100%; }

        .refresh-toggle { position: fixed; bottom: 20px; right: 30px; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .toggle-downup { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); border: 1px solid var(--border-primary); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1.3rem; color: var(--border-primary); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .toggle-downup i { transition: transform 0.4s ease; }
        .toggle-downup:active { transform: scale(0.85); }
        
        .refresh-menu { display: none; flex-direction: column; gap: 8px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); border: 1px solid var(--border-primary); border-radius: 20px; padding: 12px; min-width: 160px; }
        .refresh-menu.show { display: flex; }
        .refresh-menu-item { background: rgba(255, 255, 255, 0.05); border: 1px solid transparent; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .refresh-menu-item:hover { background: var(--border-primary); color: white; transform: scale(0.98); }
        
        .active-timer { text-align: center; font-family: 'Space Mono', monospace; font-size: 0.7rem; color: #a990e0; margin-bottom: 5px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.2); }

        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 5px; }
        .theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; justify-self: center; box-shadow: inset 0 0 4px rgba(0,0,0,0.5); }
        .theme-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 8px currentColor; }

        .go-to-top { position: fixed; bottom: 85px; right: 30px; width: 48px; height: 48px; z-index: 99; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; background: #000000; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .go-to-top.show { opacity: 1; visibility: visible; }
        .go-to-top svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); border-radius: 50%; }
        .circle-bg { stroke: rgba(255,255,255,0.1); stroke-width: 2.5; }
        .circle-progress { stroke: #0a84ff; stroke-width: 2.5; stroke-dasharray: 100.53; stroke-dashoffset: 100.53; transition: stroke-dashoffset 0.1s linear, stroke 0.5s ease; stroke-linecap: round; }
        .go-to-top span { z-index: 1; font-size: 1.2rem; transform: translateY(-1px); }
        .go-to-top:active { transform: scale(0.85); }

        @media (max-width: 768px) { 
            .refresh-toggle { right: 20px; } 
            .go-to-top { right: 20px; }
        }

        .hero { text-align: center; margin-bottom: 2rem; padding: 0.5rem; }
        .judul-utama { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; letter-spacing: 0.2em; line-height: 1.2; margin-bottom: 0.5rem; }
        .judul-utama .my { color: #ffffff; text-shadow: 0 0 6px rgba(255,255,255,0.3); }
        .judul-utama .beautiful { color: var(--border-primary); text-shadow: 0 0 14px var(--glow-color); transition: color 0.5s; }
        .koleksi-label { font-size: 1rem; font-weight: 500; letter-spacing: 0.3em; margin-bottom: 1.4rem; text-transform: uppercase; color: #d0b0ff; }
        
        .typing-area { display: flex; justify-content: center; align-items: baseline; gap: 0.625rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .madeby-label { color: #c0b0e0; font-weight: 500; font-size: 1rem; }
        .typing-wrapper { display: inline-flex; align-items: baseline; background: rgba(0, 0, 0, 0.55); padding: 0.3rem 1rem; border-radius: 60px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); }
        #typingName { font-weight: 700; color: #0a4cff; font-family: 'Space Mono', monospace; font-size: 1.05rem; letter-spacing: 0.5px; }
        .cursor-blink { font-weight: bold; color: var(--border-primary); animation: blink 1s step-end infinite; font-size: 1.1rem; display: inline-block; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .search-section { margin: 0.8rem auto 1.2rem auto; max-width: 420px; width: 90%; text-align: center; }
        .search-label { font-size: 0.85rem; color: var(--border-primary); margin-bottom: 8px; font-weight: 500; transition: color 0.5s; }
        .search-box { background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); padding: 0.8rem; border-radius: 16px; border: 1px solid var(--border-primary); transition: border-color 0.5s; }
        .search-box input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; color: white; font-size: 1rem; padding: 12px 16px; width: 100%; outline: none; font-family: 'Space Mono', monospace; margin-bottom: 12px; }
        .search-box input::placeholder { color: #888; }
        .search-buttons { display: flex; gap: 10px; justify-content: center; }
        .search-box button { background: linear-gradient(135deg, var(--btn-grad-1), var(--btn-grad-2)); border: none; padding: 8px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; flex: 1; max-width: 120px; }
        .search-box button:last-child { background: #3a2a6a; }
        .search-box button:hover { transform: scale(0.96); }

        .filter-chips { display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .filter-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #b0a0d0; padding: 6px 16px; border-radius: 30px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: var(--border-primary); color: #fff; border-color: var(--border-primary); }
        .search-status { font-size: 0.7rem; margin-top: 10px; color: #a990e0; font-family: monospace; min-height: 24px; }

        .rocket-container { position: relative; height: 80px; margin: 0.5rem 0 1rem; overflow: hidden; }
        .rocket { position: absolute; bottom: -40px; font-size: 2rem; filter: drop-shadow(0 0 4px var(--border-primary)); animation: flyUp linear infinite; transition: filter 0.5s; }
        .rocket-left { left: 15%; animation-duration: 3.5s; animation-delay: 0s; }
        .rocket-center { left: 50%; transform: translateX(-50%); animation-duration: 4.2s; animation-delay: 1s; }
        .rocket-right { right: 15%; animation-duration: 3.8s; animation-delay: 0.5s; }
        @keyframes flyUp { 0% { bottom: -40px; opacity: 1; } 80% { opacity: 1; } 100% { bottom: 100%; opacity: 0; } }

        .counter-wrapper { text-align: center; margin: 0.5rem 0 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
        .counter-info { font-size: 0.85rem; color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.1); display: inline-block; padding: 0.4rem 1.5rem; border-radius: 30px; font-family: 'Space Mono', monospace; }
        .social-icons { display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap; }
        .social-icon { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: transform 0.2s; text-decoration: none; }
        .social-icon:active { transform: scale(0.9); }
        .whatsapp-icon { background: #25D366; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; box-shadow: 0 0 10px rgba(37, 211, 102, 0.5); }
        .tiktok-icon { background: #000000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #ffffff; border: 1px solid #ff0050; box-shadow: 0 0 8px rgba(255, 0, 80, 0.5); }
        .social-label { font-size: 0.6rem; color: #ccc; font-family: monospace; }

        .all-collections-header { text-align: center; margin: 1.5rem 0 1rem; padding: 0.6rem; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); font-weight: 500; font-size: 0.85rem; letter-spacing: 1px; color: #fff; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin: 1.5rem 0 2rem; }
        @media (min-width: 1025px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1400px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 768px) { .gallery-grid { grid-template-columns: 1fr; gap: 1.5rem; } }

        .gallery-item { transition: transform 0.2s ease; border-radius: 20px; position: relative; }
        .gallery-item:active { transform: scale(0.98); }

        .photo-frame { position: relative; width: 100%; background: #08080c; border-radius: 24px; border: 2px solid var(--border-primary); box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 20px rgba(0,0,0,0.6); overflow: hidden; cursor: pointer; transition: border-color 1.5s ease-in-out, box-shadow 1.5s ease-in-out, transform 0.3s; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .photo-frame:hover { transform: scale(1.02); z-index: 10; }
        
        .photo-frame.flash-white { border-color: #ffffff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .photo-frame img, .photo-frame video { width: 100%; height: auto; display: block; transition: transform 0.25s ease, filter 0.5s ease; object-fit: contain; }
        
        .blur-up { filter: blur(10px); }
        .blur-up.loaded { filter: blur(0); }

        .fav-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: white; cursor: pointer; z-index: 5; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .fav-btn.active { color: #ff0050; background: rgba(255,0,80,0.1); border-color: #ff0050; text-shadow: 0 0 8px rgba(255,0,80,0.5); }
        .fav-btn:active { transform: scale(0.8); }

        .caption-foto { text-align: center; margin-top: 12px; font-size: 0.85rem; font-weight: 600; color: #ccc; font-family: 'Space Mono', monospace; }
        .empty-message { grid-column: 1 / -1; text-align: center; padding: 3rem 1.5rem; background: rgba(0,0,0,0.5); border-radius: 36px; border: 1px dashed rgba(255,255,255,0.2); margin: 1rem 0; }
        .empty-message i { font-size: 3rem; margin-bottom: 1rem; color: var(--border-primary); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 10000; justify-content: center; align-items: center; touch-action: none; }
        .modal.active { display: flex; }
        
        .modal-tools { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10002; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 40px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .slide-btn { background: transparent; border: none; color: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; padding: 5px 10px; border-radius: 20px; transition: 0.2s; display: flex; align-items: center; gap: 5px; opacity: 0.7; }
        .slide-btn.active { background: white; color: black; opacity: 1; }

        .modal-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; z-index: 10001; transition: 0.2s; backdrop-filter: blur(4px); }
        .modal-nav:active { transform: translateY(-50%) scale(0.85); background: rgba(255,255,255,0.3); }
        .modal-prev { left: 15px; } .modal-next { right: 15px; }
        @media (min-width: 768px) { .modal-prev { left: 30px; width: 60px; height: 60px; font-size: 1.8rem; } .modal-next { right: 30px; width: 60px; height: 60px; font-size: 1.8rem; } }

        .modal-content-wrapper { max-width: 95vw; max-height: 85vh; position: relative; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; justify-content: center; align-items: center; flex-direction: column; width: 100%; }
        .modal-content { max-width: 100%; max-height: 85vh; position: relative; border: 2px solid var(--border-primary); border-radius: 20px; background: transparent; transition: border-color 0.5s; display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        .modal-content img, .modal-content video { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 16px; display: block; }
        
        .modal-fav-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; z-index: 10005; }
        .modal-fav-btn.active { color: #ff0050; background: rgba(255,0,80,0.1); border-color: #ff0050; text-shadow: 0 0 8px rgba(255,0,80,0.5); }
        .modal-fav-btn:active { transform: scale(0.9); }

        .modal-bottom-actions { position: absolute; bottom: -60px; right: 0; display: flex; align-items: center; z-index: 10001; }
        
        .modal-download-btn-new { background: #25D366; border: none; padding: 10px 24px; border-radius: 40px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: monospace; white-space: nowrap; transition: 0.2s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        .modal-download-btn-new:hover { background: #128C7E; transform: scale(1.05); }
        @media (max-width: 480px) { .modal-bottom-actions { bottom: -55px; } .modal-download-btn-new { font-size: 0.85rem; padding: 8px 18px; } }
        
        .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.5rem; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 10002; }
        .modal-close:active { transform: scale(0.85); background: rgba(255,255,255,0.4); }

        .custom-footer { text-align: center; margin-top: 2rem; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; color: #6a5a9a; }
        .footer-copyright { margin-bottom: 6px; font-family: monospace; color: #aaa; }
        .footer-datetime { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: #666; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
        .loading-card { background: #010101; border-radius: 32px; padding: 2rem; text-align: center; border: 2px solid var(--border-primary); box-shadow: 0 0 20px rgba(0,0,0,0.8); width: 280px; transition: border-color 0.5s; }
        .loading-avatar { width: 100px; height: 100px; margin: 0 auto 1.2rem auto; border-radius: 24px; object-fit: cover; border: 2px solid var(--border-primary); transition: border-color 0.5s; }
        .loading-text { color: #fff; margin: 0.5rem 0 1rem; font-size: 0.95rem; font-weight: 600; }
        .progress-container { width: 100%; background-color: rgba(255,255,255,0.1); border-radius: 40px; height: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--btn-grad-1), var(--btn-grad-2)); transition: width 0.1s linear, background 0.5s; }
        .timer-text { font-size: 0.75rem; margin-top: 14px; color: #888; font-family: 'Space Mono', monospace; }
        .loading-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>
<div class="hero-glow"></div>
<div class="stars"></div>

<div class="refresh-toggle">
    <div class="toggle-downup" id="toggleDownUpBtn"><i class="fas fa-bars"></i></div>
    <div class="refresh-menu" id="refreshMenu">
        <div class="active-timer" id="activeTimer">0H:0J:0M:0S</div>
        <div class="refresh-menu-item" id="refreshCollectionBtn"><i class="fas fa-sync-alt"></i> Refresh</div>
        <div class="refresh-menu-item" id="musicBtn"><i class="fas fa-music"></i> Music</div>
        <div class="refresh-menu-item" style="justify-content: center; background: transparent; padding: 4px; pointer-events: none; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 4px;"><span style="font-size: 0.65rem; color: #fff; font-weight: bold;">THEMES</span></div>
        <div class="theme-grid">
            <div class="theme-dot active" style="background: linear-gradient(135deg, #b77eff, #0a84ff);" data-glow="rgba(128, 0, 255, 0.22)" data-bdr="#b77eff" data-g1="#b77eff" data-g2="#0a84ff"></div>
            <div class="theme-dot" style="background: #b77eff;" data-glow="rgba(183, 126, 255, 0.22)" data-bdr="#b77eff" data-g1="#b77eff" data-g2="#b77eff"></div>
            <div class="theme-dot" style="background: #0a84ff;" data-glow="rgba(10, 132, 255, 0.22)" data-bdr="#0a84ff" data-g1="#0a84ff" data-g2="#0a84ff"></div>
            <div class="theme-dot" style="background: linear-gradient(135deg, #00f2ff, #ff0050);" data-glow="rgba(0, 242, 255, 0.22)" data-bdr="#00f2ff" data-g1="#00f2ff" data-g2="#ff0050"></div>
            <div class="theme-dot" style="background: #ffea00;" data-glow="rgba(255, 234, 0, 0.22)" data-bdr="#ffea00" data-g1="#ffea00" data-g2="#ffea00"></div>
            <div class="theme-dot" style="background: #ff0050;" data-glow="rgba(255, 0, 80, 0.22)" data-bdr="#ff0050" data-g1="#ff0050" data-g2="#ff0050"></div>
            <div class="theme-dot" style="background: linear-gradient(135deg, #00e676, #ffea00);" data-glow="rgba(0, 230, 118, 0.22)" data-bdr="#00e676" data-g1="#00e676" data-g2="#ffea00"></div>
            <div class="theme-dot" style="background: linear-gradient(135deg, #ff9100, #b77eff);" data-glow="rgba(255, 145, 0, 0.22)" data-bdr="#ff9100" data-g1="#ff9100" data-g2="#b77eff"></div>
            <div class="theme-dot" style="background: #00e676;" data-glow="rgba(0, 230, 118, 0.22)" data-bdr="#00e676" data-g1="#00e676" data-g2="#00e676"></div>
        </div>
    </div>
</div>

<div id="goToTop" class="go-to-top">
    <svg viewBox="0 0 36 36">
        <circle class="circle-bg" cx="18" cy="18" r="16" fill="none"></circle>
        <circle class="circle-progress" id="scrollProgress" cx="18" cy="18" r="16" fill="none"></circle>
    </svg>
    <span>🚀</span>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card">
        <img class="loading-avatar" src="MY/loading.jpg" alt="loading" onerror="this.src='https://n.uguu.se/ztaVUtjW.jpeg'">
        <div class="loading-text">Membuka Halaman Koleksi...</div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="timer-text" id="timerText">60 detik menuju koleksi</div>
    </div>
</div>

<div id="mediaModal" class="modal">
    <div class="modal-tools">
        <button class="slide-btn active" id="slideOff"><i class="fas fa-pause"></i> Manual</button>
        <button class="slide-btn" id="slide5s"><i class="fas fa-play"></i> 5s</button>
        <button class="slide-btn" id="slide10s"><i class="fas fa-play"></i> 10s</button>
    </div>
    <button class="modal-close" id="modalClose">&times;</button>
    <button class="modal-nav modal-prev" id="modalPrev"><i class="fas fa-chevron-left"></i></button>
    
    <div class="modal-content-wrapper" id="modalWrapper">
        <div class="modal-content" id="modalContentInner">
            <div class="modal-fav-btn" id="modalFavBtn"><i class="far fa-heart"></i></div>
            <div id="modalMedia"></div>
        </div>
        
        <div class="modal-bottom-actions">
            <button class="modal-download-btn-new" id="modalDownloadBtn"><i class="fas fa-download"></i> Simpan</button>
        </div>
    </div>
    
    <button class="modal-nav modal-next" id="modalNext"><i class="fas fa-chevron-right"></i></button>
</div>

<div class="container">
    <div class="hero">
        <div class="judul-utama"><span class="my">MY</span> <span class="beautiful">BEAUTIFUL</span></div>
        <div class="koleksi-label">K O L E K S I</div>
        
        <div class="typing-area">
            <span class="madeby-label">Made By:</span>
            <div class="typing-wrapper">
                <div id="typingContainer"><span id="typingName"></span><span class="cursor-blink" id="cursorSpan">|</span></div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-label"><i class="fas fa-search"></i> cari koleksi berdasarkan nomor / ID</div>
            <div class="search-box">
                <input type="number" id="searchInput" placeholder="contoh: 1, 5, 42" min="1">
                <div class="search-buttons">
                    <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
                    <button id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
                </div>
            </div>
            
            <div class="filter-chips">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="image"><i class="fas fa-image"></i> Gambar</button>
                <button class="filter-btn" data-filter="video"><i class="fas fa-video"></i> Video</button>
                <button class="filter-btn" data-filter="fav" style="border-color: rgba(255,0,80,0.5);"><i class="fas fa-heart" style="color: #ff0050;"></i> Favorit</button>
            </div>
            <div id="searchStatus" class="search-status"></div>
        </div>
    </div>

    <div class="rocket-container">
        <div class="rocket rocket-left">🚀</div>
        <div class="rocket rocket-center">🚀</div>
        <div class="rocket rocket-right">🚀</div>
    </div>

    <div class="counter-wrapper">
        <div id="dynamicCounter" class="counter-info">Total Koleksi: 0</div>
        <div class="social-icons">
            <a class="social-icon" href="https://wa.me/6288808498725?text=" target="_blank">
                <div class="whatsapp-icon"><i class="fab fa-whatsapp"></i></div>
                <span class="social-label">Bot WhatsApp</span>
            </a>
            <a class="social-icon" href="#" id="tiktokLink" target="_blank">
                <div class="tiktok-icon"><i class="fab fa-tiktok"></i></div>
                <span class="social-label">TikTok</span>
            </a>
        </div>
    </div>

    <div class="all-collections-header">ALL COLLECTIONS</div>

    <div class="gallery-grid" id="galeriGrid"></div>

    <div class="custom-footer">
        <div class="footer-copyright">Copyright: FebryJW 🚀</div>
        <div class="footer-datetime" id="datetimeDisplay"></div>
    </div>
</div>

<script>
    const FOLDER_PATH = "MY/";
    const EXTENSIONS = [".jpg", ".jpeg", ".png", ".webp", ".mp4"];
    
    let allMedia = [];
    let currentFiltered = [];
    let favs = JSON.parse(localStorage.getItem('my_favs')) || [];
    let currentModalMedia = null;
    let audioPlayer = null;
    let isMusicPlaying = false;
    let borderInterval = null;
    let slideInterval = null;
    let currentTypeFilter = "all";
    let sessionStartTime = Date.now();

    const vibrate = (ms = 40) => { if(navigator.vibrate) navigator.vibrate(ms); };

    // Timer Aktif User
    setInterval(() => {
        let diff = Math.floor((Date.now() - sessionStartTime) / 1000);
        let d = Math.floor(diff / 86400);
        let h = Math.floor((diff % 86400) / 3600);
        let m = Math.floor((diff % 3600) / 60);
        let s = diff % 60;
        document.getElementById('activeTimer').innerText = `${d}H:${h}J:${m}M:${s}S`;
    }, 1000);

    document.querySelectorAll('.theme-dot').forEach(dot => {
        dot.addEventListener('click', (e) => {
            vibrate(30);
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            document.documentElement.style.setProperty('--glow-color', dot.getAttribute('data-glow'));
            document.documentElement.style.setProperty('--border-primary', dot.getAttribute('data-bdr'));
            document.documentElement.style.setProperty('--btn-grad-1', dot.getAttribute('data-g1'));
            document.documentElement.style.setProperty('--btn-grad-2', dot.getAttribute('data-g2'));
        });
    });

    const musicBtn = document.getElementById('musicBtn');
    musicBtn.addEventListener('click', () => {
        vibrate(40);
        if (!audioPlayer) { audioPlayer = new Audio(`${FOLDER_PATH}1.mp3`); audioPlayer.loop = true; }
        if (isMusicPlaying) { audioPlayer.pause(); isMusicPlaying = false; musicBtn.innerHTML = '<i class="fas fa-music"></i> Music'; } 
        else { audioPlayer.play().catch(()=>{}); isMusicPlaying = true; musicBtn.innerHTML = '<i class="fas fa-stop"></i> Stop'; }
    });

    const toggleDownUpBtn = document.getElementById('toggleDownUpBtn');
    const refreshMenu = document.getElementById('refreshMenu');
    let menuOpen = false;
    toggleDownUpBtn.addEventListener('click', () => {
        vibrate(30); menuOpen = !menuOpen;
        const icon = toggleDownUpBtn.querySelector('i');
        if (menuOpen) { 
            refreshMenu.classList.add('show'); 
            icon.className = 'fas fa-times';
            icon.style.transform = 'rotate(90deg)';
        } else { 
            refreshMenu.classList.remove('show'); 
            icon.className = 'fas fa-bars';
            icon.style.transform = 'rotate(0deg)';
        }
    });

    document.getElementById('refreshCollectionBtn').addEventListener('click', async () => {
        vibrate(30); menuOpen = false; refreshMenu.classList.remove('show'); 
        const icon = toggleDownUpBtn.querySelector('i');
        icon.className = 'fas fa-bars'; icon.style.transform = 'rotate(0deg)';
        
        document.getElementById('galeriGrid').innerHTML = `<div class="empty-message"><i class="fas fa-spinner fa-pulse"></i><p>Memuat ulang koleksi...</p></div>`;
        await detectAllMediaConcurrently();
        applyFilters();
    });

    window.addEventListener('scroll', () => {
        let s = window.scrollY, h = document.documentElement.scrollHeight - window.innerHeight;
        let p = s / h;
        if(isNaN(p)) p = 0;
        document.getElementById('scrollProgress').style.strokeDashoffset = 100.53 - (p * 100.53);
        
        if(s > 300) document.getElementById('goToTop').classList.add('show');
        else document.getElementById('goToTop').classList.remove('show');
    });
    document.getElementById('goToTop').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

    function updateDateTime() {
        const now = new Date();
        const wibTime = new Date(now.getTime() + (7 * 60 * 60 * 1000));
        document.getElementById('datetimeDisplay').innerHTML = 
            `${wibTime.getUTCHours().toString().padStart(2, '0')}:${wibTime.getUTCMinutes().toString().padStart(2, '0')}:${wibTime.getUTCSeconds().toString().padStart(2, '0')} WIB · ${wibTime.getUTCDate().toString().padStart(2, '0')}/${(wibTime.getUTCMonth() + 1).toString().padStart(2, '0')}/${wibTime.getUTCFullYear()}`;
    }
    setInterval(updateDateTime, 1000); updateDateTime();

    const fullName = "FebryJW🚀"; let currentTyped = ""; let tId = null;
    function typeCycle() {
        if(currentTyped.length < fullName.length) {
            currentTyped = fullName.substring(0, currentTyped.length + 1);
            document.getElementById('typingName').innerText = currentTyped;
            tId = setTimeout(typeCycle, 120);
        } else setTimeout(deleteCycle, 3000);
    }
    function deleteCycle() {
        if(currentTyped.length > 0) {
            currentTyped = currentTyped.substring(0, currentTyped.length - 1);
            document.getElementById('typingName').innerText = currentTyped;
            tId = setTimeout(deleteCycle, 100);
        } else setTimeout(typeCycle, 3000);
    }

    async function fileExists(url) {
        try {
            const res = await fetch(url + `?cb=${Date.now()}`, { method: 'HEAD', cache: 'no-store' });
            return res.ok;
        } catch(e) { return false; }
    }

    async function checkExts(i) {
        for (let ext of EXTENSIONS) {
            const url = `${FOLDER_PATH}${i}${ext}`;
            const exists = await fileExists(url);
            if (exists) {
                return { index: i, src: url, type: ext === '.mp4' ? 'video' : 'image' };
            }
        }
        return null; 
    }

    async function detectAllMediaConcurrently() {
        allMedia = [];
        const maxId = 150; 
        const batchSize = 10; 
        
        for (let i = 1; i <= maxId; i += batchSize) {
            const promises = [];
            for (let j = i; j < i + batchSize && j <= maxId; j++) {
                promises.push(checkExts(j));
            }
            const results = await Promise.all(promises);
            const validFiles = results.filter(r => r !== null);
            allMedia.push(...validFiles);
            
            if (validFiles.length === 0 && i > 20) break;
        }
        
        allMedia.sort((a, b) => a.index - b.index);
        document.getElementById('dynamicCounter').innerHTML = `Total Koleksi: ${allMedia.length}`;
    }

    if (borderInterval) clearInterval(borderInterval);
    borderInterval = setInterval(() => {
        document.querySelectorAll('.photo-frame').forEach(f => {
            f.classList.toggle('flash-white');
        });
    }, 3000);

    function renderGallery(mediaList) {
        const grid = document.getElementById('galeriGrid');
        grid.innerHTML = '';
        if (mediaList.length === 0) {
            grid.innerHTML = `<div class="empty-message"><i class="fas fa-images"></i><p>Koleksi Tidak Ada</p></div>`;
            return;
        }

        mediaList.forEach(m => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const frame = document.createElement('div');
            frame.className = 'photo-frame';
            
            const isFav = favs.includes(m.index);
            const favBtn = document.createElement('div');
            favBtn.className = `fav-btn ${isFav ? 'active' : ''}`;
            favBtn.setAttribute('data-favid', m.index);
            favBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
            favBtn.onclick = (e) => { e.stopPropagation(); toggleFav(m.index); };

            if (m.type === 'video') {
                const vid = document.createElement('video');
                vid.className = 'blur-up';
                vid.muted = true; vid.loop = true; vid.playsInline = true;
                vid.src = m.src;
                vid.onloadeddata = () => vid.classList.add('loaded');
                frame.appendChild(vid);
            } else {
                const img = document.createElement('img');
                img.className = 'blur-up';
                img.loading = "lazy";
                img.onload = () => img.classList.add('loaded');
                img.onerror = function() { this.src = 'https://n.uguu.se/ztaVUtjW.jpeg'; this.classList.add('loaded'); };
                img.src = m.src;
                frame.appendChild(img);
            }
            
            frame.appendChild(favBtn);
            frame.onclick = () => openModal(m);
            item.appendChild(frame);
            
            const cap = document.createElement('div');
            cap.className = 'caption-foto';
            cap.innerHTML = `<i class="fas fa-hashtag"></i> SEC_ID: ${m.index}`;
            item.appendChild(cap);
            grid.appendChild(item);
        });
    }

    function toggleFav(idx) {
        vibrate(40);
        const isFav = favs.includes(idx);
        
        if(isFav) {
            favs = favs.filter(x => x !== idx);
        } else {
            favs.push(idx);
        }
        localStorage.setItem('my_favs', JSON.stringify(favs));
        
        document.querySelectorAll(`[data-favid="${idx}"]`).forEach(btn => {
            if(!isFav) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-heart"></i>';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="far fa-heart"></i>';
            }
        });

        if(currentModalMedia && currentModalMedia.index === idx) {
            const mBtn = document.getElementById('modalFavBtn');
            if(!isFav) {
                mBtn.classList.add('active');
                mBtn.innerHTML = '<i class="fas fa-heart"></i>';
            } else {
                mBtn.classList.remove('active');
                mBtn.innerHTML = '<i class="far fa-heart"></i>';
            }
        }
        
        if(currentTypeFilter === 'fav' && isFav) {
            const item = document.querySelector(`[data-favid="${idx}"]`);
            if(item) {
                const parent = item.closest('.gallery-item');
                if(parent) parent.style.display = 'none';
            }
        }
    }

    function applyFilters() {
        const sVal = document.getElementById('searchInput').value.trim();
        let temp = [...allMedia];
        
        if (sVal !== "" && !isNaN(sVal)) temp = temp.filter(m => m.index === parseInt(sVal, 10));
        
        if (currentTypeFilter === 'image') temp = temp.filter(m => m.type === 'image');
        else if (currentTypeFilter === 'video') temp = temp.filter(m => m.type === 'video');
        else if (currentTypeFilter === 'fav') temp = temp.filter(m => favs.includes(m.index));
        
        currentFiltered = temp;
        renderGallery(currentFiltered);
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            vibrate(30);
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const tBtn = e.target.closest('.filter-btn');
            tBtn.classList.add('active');
            currentTypeFilter = tBtn.getAttribute('data-filter');
            applyFilters();
        });
    });

    document.getElementById('searchBtn').onclick = () => { vibrate(30); applyFilters(); };
    document.getElementById('resetBtn').onclick = () => { vibrate(30); document.getElementById('searchInput').value = ""; applyFilters(); };
    document.getElementById('searchInput').onkeypress = (e) => { if(e.key === 'Enter') { vibrate(30); applyFilters(); }};

    const modal = document.getElementById('mediaModal');
    const modalMedia = document.getElementById('modalMedia');
    const modalWrapper = document.getElementById('modalWrapper');
    const modalFavBtn = document.getElementById('modalFavBtn');

    function openModal(mObj) {
        vibrate(30);
        currentModalMedia = mObj;
        
        history.pushState({ modalOpen: true }, "", "#/view/" + mObj.index);
        
        modalMedia.innerHTML = '';
        
        if (mObj.type === 'video') {
            const vid = document.createElement('video');
            vid.src = mObj.src; vid.controls = true; vid.autoplay = true; vid.playsInline = true;
            vid.onplay = () => { if(isMusicPlaying && audioPlayer) audioPlayer.pause(); };
            vid.onpause = () => { if(isMusicPlaying && audioPlayer) audioPlayer.play(); };
            modalMedia.appendChild(vid);
        } else {
            const img = document.createElement('img');
            img.src = mObj.src;
            modalMedia.appendChild(img);
        }
        
        if(favs.includes(mObj.index)) {
            modalFavBtn.classList.add('active');
            modalFavBtn.innerHTML = '<i class="fas fa-heart"></i>';
        } else {
            modalFavBtn.classList.remove('active');
            modalFavBtn.innerHTML = '<i class="far fa-heart"></i>';
        }
        
        modalWrapper.style.transform = 'translateY(0) scale(1)';
        modal.classList.add('active');
    }

    function doCloseModalUI() {
        modal.classList.remove('active');
        const v = modalMedia.querySelector('video');
        if(v) { v.pause(); v.src=''; }
        if(isMusicPlaying && audioPlayer) audioPlayer.play().catch(()=>{});
        if(slideInterval) setSlideMode('off');
        setTimeout(() => modalMedia.innerHTML='', 300);
    }

    function closeModal() {
        vibrate(30);
        history.replaceState(null, null, window.location.pathname + window.location.search);
        doCloseModalUI();
    }

    document.getElementById('modalClose').onclick = closeModal;

    window.addEventListener('popstate', (e) => {
        if (!location.hash.includes('#/view/')) {
            doCloseModalUI();
        } else {
            const id = parseInt(location.hash.split('/')[2]);
            const found = allMedia.find(x => x.index === id);
            if(found) {
                currentModalMedia = found;
                if(!modal.classList.contains('active')) {
                    openModal(found);
                }
            }
        }
    });

    modalFavBtn.onclick = (e) => {
        e.stopPropagation();
        toggleFav(currentModalMedia.index);
    };

    function navModal(dir) {
        vibrate(20);
        if(!currentFiltered.length || !currentModalMedia) return;
        let idx = currentFiltered.findIndex(x => x.index === currentModalMedia.index) + dir;
        if(idx < 0) idx = currentFiltered.length - 1;
        if(idx >= currentFiltered.length) idx = 0;
        
        history.replaceState(null, "", "#/view/" + currentFiltered[idx].index);
        openModal(currentFiltered[idx]);
    }
    document.getElementById('modalPrev').onclick = (e) => { e.stopPropagation(); navModal(-1); };
    document.getElementById('modalNext').onclick = (e) => { e.stopPropagation(); navModal(1); };

    let startY = 0, currentY = 0, isPulling = false;
    modal.addEventListener('touchstart', e => {
        if(e.target.closest('.modal-tools') || e.target.closest('.modal-nav') || e.target.closest('.modal-close') || e.target.closest('.modal-bottom-actions') || e.target.closest('.modal-fav-btn')) return;
        startY = e.touches[0].clientY;
        isPulling = true;
        modalWrapper.style.transition = 'none';
    }, {passive:true});
    modal.addEventListener('touchmove', e => {
        if(!isPulling) return;
        currentY = e.touches[0].clientY;
        let dy = currentY - startY;
        if(dy > 0) {
            let scale = Math.max(0.8, 1 - (dy/1000));
            modalWrapper.style.transform = `translateY(${dy}px) scale(${scale})`;
        }
    }, {passive:true});
    modal.addEventListener('touchend', e => {
        if(!isPulling) return;
        isPulling = false;
        modalWrapper.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
        if(currentY - startY > 120) closeModal();
        else modalWrapper.style.transform = 'translateY(0) scale(1)';
    });

    document.getElementById('modalDownloadBtn').onclick = () => {
        vibrate(40);
        const a = document.createElement('a');
        a.href = currentModalMedia.src;
        a.download = `MY_BEAUTIFUL_${currentModalMedia.index}.${currentModalMedia.type==='video'?'mp4':'jpg'}`;
        a.click();
    };

    function setSlideMode(mode) {
        vibrate(30);
        if(slideInterval) clearInterval(slideInterval);
        document.querySelectorAll('.slide-btn').forEach(b => b.classList.remove('active'));
        if(mode === '5s') {
            document.getElementById('slide5s').classList.add('active');
            slideInterval = setInterval(()=>navModal(1), 5000);
        } else if(mode === '10s') {
            document.getElementById('slide10s').classList.add('active');
            slideInterval = setInterval(()=>navModal(1), 10000);
        } else {
            document.getElementById('slideOff').classList.add('active');
        }
    }
    document.getElementById('slideOff').onclick = () => setSlideMode('off');
    document.getElementById('slide5s').onclick = () => setSlideMode('5s');
    document.getElementById('slide10s').onclick = () => setSlideMode('10s');

    async function init() {
        typeCycle();
        
        const fetchTask = detectAllMediaConcurrently();
        
        let el = 0; const totalTime = 60;
        const progressInterval = setInterval(() => {
            el += 0.1;
            let percent = Math.min((el / totalTime) * 100, 100);
            document.getElementById('progressFill').style.width = percent + '%';
            
            let timeLeft = Math.max(0, Math.ceil(totalTime - el));
            document.getElementById('timerText').innerText = `${timeLeft} detik menuju koleksi`;
            
            if (el >= totalTime) {
                clearInterval(progressInterval);
                document.getElementById('timerText').innerText = `Membuka koleksi...`;
                
                fetchTask.then(() => {
                    applyFilters();
                    document.getElementById('loadingOverlay').classList.add('hide');
                });
            }
        }, 100);
    }
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
