<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MY BEAUTIFUL - Koleksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 100%;
            scroll-behavior: smooth;
        }

        @media (max-width: 640px) {
            html { font-size: 87.5%; }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            html { font-size: 93.75%; }
        }

        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: white;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
        }

        .hero-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            height: 450px;
            background: radial-gradient(ellipse at center, rgba(128, 0, 255, 0.22), rgba(0,0,0,0) 75%);
            pointer-events: none;
            z-index: 0;
            filter: blur(45px);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(1px 1px at 15% 25%, #ffffff0c, transparent),
                        radial-gradient(1.2px 1.2px at 78% 65%, #b77eff12, transparent);
            background-size: 280px 280px, 320px 320px;
            background-repeat: repeat;
            opacity: 0.4;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        /* Toggle Refresh di pojok kanan bawah */
        .refresh-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .toggle-downup {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #b77eff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.3rem;
            color: #b77eff;
        }
        .toggle-downup:hover {
            background: rgba(128, 90, 255, 0.3);
            transform: scale(1.05);
        }
        .refresh-menu {
            display: none;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #b77eff;
            border-radius: 20px;
            padding: 10px;
        }
        .refresh-menu.show {
            display: flex;
        }
        .refresh-menu-item {
            background: rgba(128, 90, 255, 0.2);
            border: 1px solid #b77eff;
            color: #b77eff;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .refresh-menu-item:hover {
            background: rgba(128, 90, 255, 0.4);
            transform: scale(0.98);
        }
        @media (max-width: 768px) {
            .refresh-toggle { bottom: 15px; right: 15px; }
            .toggle-downup { width: 42px; height: 42px; font-size: 1rem; }
            .refresh-menu-item { padding: 6px 12px; font-size: 0.7rem; }
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
            padding: 0.5rem;
        }

        .judul-utama {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: 0.2em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        .judul-utama .my {
            color: #ffffff;
            text-shadow: 0 0 6px rgba(255,255,255,0.3);
        }
        .judul-utama .beautiful {
            color: #b77eff;
            text-shadow: 0 0 14px #b77effaa;
        }

        .koleksi-label {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            margin-bottom: 1.4rem;
            text-transform: uppercase;
            color: #d0b0ff;
        }

        .typing-area {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 0.625rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .madeby-label {
            color: #c0b0e0;
            font-weight: 500;
            font-size: 1rem;
        }
        .typing-wrapper {
            display: inline-flex;
            align-items: baseline;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid #b77eff30;
        }
        #typingName {
            font-weight: 700;
            color: #0a4cff;
            font-family: 'Space Mono', monospace;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }
        .cursor-blink {
            font-weight: bold;
            color: #b77eff;
            animation: blink 1s step-end infinite;
            font-size: 1.1rem;
            display: inline-block;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .search-section {
            margin: 0.8rem auto 1.2rem auto;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .search-label {
            font-size: 0.85rem;
            color: #b77eff;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .search-box {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid #b77eff50;
        }
        .search-box input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #b77eff50;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            font-family: 'Space Mono', monospace;
            margin-bottom: 12px;
        }
        .search-box input::placeholder {
            color: #5a4a8a;
        }
        .search-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .search-box button {
            background: linear-gradient(135deg, #b77eff, #7a3eff);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            max-width: 120px;
        }
        .search-box button:last-child {
            background: #3a2a6a;
        }
        .search-box button:hover {
            transform: scale(0.96);
        }

        .search-status {
            font-size: 0.7rem;
            margin-top: 10px;
            color: #a990e0;
            font-family: monospace;
            min-height: 24px;
        }

        .rocket-container {
            position: relative;
            height: 80px;
            margin: 0.5rem 0 1rem;
            overflow: hidden;
        }
        .rocket {
            position: absolute;
            bottom: -40px;
            font-size: 2rem;
            filter: drop-shadow(0 0 4px #b77eff);
            animation: flyUp linear infinite;
        }
        .rocket-left {
            left: 15%;
            animation-duration: 3.5s;
            animation-delay: 0s;
        }
        .rocket-center {
            left: 50%;
            transform: translateX(-50%);
            animation-duration: 4.2s;
            animation-delay: 1s;
        }
        .rocket-right {
            right: 15%;
            animation-duration: 3.8s;
            animation-delay: 0.5s;
        }
        @keyframes flyUp {
            0% { bottom: -40px; opacity: 1; }
            80% { opacity: 1; }
            100% { bottom: 100%; opacity: 0; }
        }

        @media (max-width: 768px) {
            .rocket { font-size: 1.5rem; }
            .rocket-left { left: 5%; }
            .rocket-right { right: 5%; }
        }

        .counter-wrapper {
            text-align: center;
            margin: 0.5rem 0 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .counter-info {
            font-size: 0.85rem;
            color: #a07eff;
            background: rgba(128, 90, 255, 0.1);
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 30px;
            font-family: 'Space Mono', monospace;
        }
        .social-icons {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .social-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }
        .social-icon:hover { transform: scale(1.05); }
        .whatsapp-icon {
            background: #25D366;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.5);
        }
        .tiktok-icon {
            background: #000000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #ffffff;
            border: 1px solid #ff0050;
            box-shadow: 0 0 8px rgba(255, 0, 80, 0.5);
        }
        .social-label {
            font-size: 0.6rem;
            color: #a07eff;
            font-family: monospace;
        }

        .all-collections-header {
            text-align: center;
            margin: 1.5rem 0 1rem;
            padding: 0.6rem;
            border-top: 1px solid #b77eff30;
            border-bottom: 1px solid #b77eff30;
            background: rgba(0,0,0,0.3);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #b0a0d0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 1.5rem 0 2rem;
        }

        @media (min-width: 1025px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1400px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        .gallery-item {
            transition: transform 0.2s ease;
            border-radius: 20px;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item.special {
            grid-column: span 1;
        }
        @media (min-width: 1025px) {
            .gallery-item.special {
                grid-column: span 2;
            }
        }

        .photo-frame {
            position: relative;
            width: 100%;
            background: #08080c;
            border-radius: 24px;
            border: 2px solid #b77eff;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 20px rgba(0,0,0,0.6);
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.3s, box-shadow 0.2s;
            min-height: 200px;
        }
        .photo-frame.blue-border {
            border-color: #0a84ff;
            box-shadow: 0 0 0 1px rgba(10,132,255,0.3), 0 8px 20px rgba(0,0,0,0.6);
        }
        .photo-frame:hover {
            box-shadow: 0 0 0 2px currentColor, 0 12px 28px black;
        }

        .photo-frame img, .photo-frame video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.25s ease;
        }
        .gallery-item:hover .photo-frame img,
        .gallery-item:hover .photo-frame video {
            transform: scale(1.01);
        }

        .placeholder-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0d0d16;
            color: #b77effcc;
            font-size: 0.85rem;
            text-align: center;
            gap: 12px;
            padding: 2rem;
        }

        .caption-foto {
            text-align: center;
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b08cff;
            font-family: 'Space Mono', monospace;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1.5rem;
            background: rgba(0,0,0,0.5);
            border-radius: 36px;
            border: 1px dashed #b77eff60;
            margin: 1rem 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .modal.active { display: flex; }
        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            cursor: default;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .modal-download-btn {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .modal-download-btn { font-size: 0.8rem; padding: 8px 16px; bottom: -45px; }
            .modal-close { top: -35px; right: -5px; width: 32px; height: 32px; font-size: 1.2rem; }
        }
        .modal-download-btn:hover {
            background: #128C7E;
            transform: translateX(-50%) scale(1.02);
        }
        .modal-close {
            position: absolute;
            top: -45px;
            right: -10px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.4); }

        .custom-footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            border-top: 1px solid rgba(128, 90, 255, 0.2);
            font-size: 0.7rem;
            color: #6a5a9a;
        }
        .footer-copyright {
            margin-bottom: 6px;
            font-family: monospace;
        }
        .footer-datetime {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #8a7ab0;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .loading-card {
            background: #010101;
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            border: 2px solid #b77eff;
            box-shadow: 0 0 20px rgba(183, 126, 255, 0.3);
            width: 280px;
        }
        .loading-avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.2rem auto;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid #b77eff;
        }
        .loading-text {
            color: #c0b0e0;
            margin: 0.5rem 0 1rem;
            font-size: 0.9rem;
        }
        .progress-container {
            width: 100%;
            background-color: #1a1a24;
            border-radius: 40px;
            height: 6px;
            overflow: hidden;
            border: 1px solid #b77eff30;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b77eff, #3a86ff);
            transition: width 0.15s linear;
        }
        .timer-text {
            font-size: 0.7rem;
            margin-top: 14px;
            color: #8a7ab0;
        }
        .loading-overlay.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="hero-glow"></div>
<div class="stars"></div>

<!-- Toggle Refresh di pojok kanan bawah -->
<div class="refresh-toggle">
    <div class="toggle-downup" id="toggleDownUpBtn">
        <i class="fas fa-chevron-up"></i>
    </div>
    <div class="refresh-menu" id="refreshMenu">
        <div class="refresh-menu-item" id="refreshCollectionBtn">
            <i class="fas fa-sync-alt"></i> Refresh Koleksi
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card">
        <img class="loading-avatar" src="MY/loading.jpg" alt="loading" onerror="this.src='https://n.uguu.se/ztaVUtjW.jpeg'">
        <div class="loading-text">Membuka Halaman Koleksi...</div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="timer-text" id="timerText">30 detik menuju koleksi</div>
    </div>
</div>

<div id="mediaModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalMedia"></div>
        <button class="modal-download-btn" id="modalDownloadBtn">
            <i class="fas fa-download"></i> Download
        </button>
    </div>
</div>

<div class="container">
    <div class="hero">
        <div class="judul-utama">
            <span class="my">MY</span> <span class="beautiful">BEAUTIFUL</span>
        </div>
        <div class="koleksi-label">K O L E K S I</div>
        
        <div class="typing-area">
            <span class="madeby-label">Made By:</span>
            <div class="typing-wrapper">
                <div id="typingContainer">
                    <span id="typingName"></span>
                    <span class="cursor-blink" id="cursorSpan">|</span>
                </div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-label"><i class="fas fa-search"></i> cari koleksi berdasarkan nomor / ID</div>
            <div class="search-box">
                <input type="number" id="searchInput" placeholder="contoh: 1, 5, 10" min="1">
                <div class="search-buttons">
                    <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
                    <button id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
                </div>
            </div>
            <div id="searchStatus" class="search-status"></div>
        </div>
    </div>

    <div class="rocket-container">
        <div class="rocket rocket-left">🚀</div>
        <div class="rocket rocket-center">🚀</div>
        <div class="rocket rocket-right">🚀</div>
    </div>

    <div class="counter-wrapper">
        <div id="dynamicCounter" class="counter-info">Total Koleksi: --</div>
        <div class="social-icons">
            <a class="social-icon" href="https://wa.me/6288808498725?text=" target="_blank">
                <div class="whatsapp-icon"><i class="fab fa-whatsapp"></i></div>
                <span class="social-label">Bot WhatsApp</span>
            </a>
            <a class="social-icon" href="#" id="tiktokLink" target="_blank">
                <div class="tiktok-icon"><i class="fab fa-tiktok"></i></div>
                <span class="social-label">TikTok</span>
            </a>
        </div>
    </div>

    <div class="all-collections-header">
        ALL COLLECTIONS
    </div>

    <div class="gallery-grid" id="galeriGrid"></div>

    <div class="custom-footer">
        <div class="footer-copyright">Copyright: FebryJW 🚀</div>
        <div class="footer-datetime" id="datetimeDisplay"></div>
    </div>
</div>

<script>
    const FOLDER_PATH = "MY/";
    const EXTENSIONS = [".jpg", ".jpeg", ".png", ".webp", ".mp4"];
    const START_INDEX = 1;
    
    const galleryGrid = document.getElementById('galeriGrid');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const progressFill = document.getElementById('progressFill');
    const timerTextSpan = document.getElementById('timerText');
    const typingNameSpan = document.getElementById('typingName');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchStatus = document.getElementById('searchStatus');
    const dynamicCounter = document.getElementById('dynamicCounter');
    const datetimeDisplay = document.getElementById('datetimeDisplay');
    const tiktokLink = document.getElementById('tiktokLink');
    const modal = document.getElementById('mediaModal');
    const modalMedia = document.getElementById('modalMedia');
    const modalClose = document.getElementById('modalClose');
    const modalDownloadBtn = document.getElementById('modalDownloadBtn');
    const toggleDownUpBtn = document.getElementById('toggleDownUpBtn');
    const refreshMenu = document.getElementById('refreshMenu');
    const refreshCollectionBtn = document.getElementById('refreshCollectionBtn');
    
    let allMedia = [];
    let currentFiltered = [];
    let currentModalSrcGlobal = "";
    let currentModalTypeGlobal = "";
    let currentModalIndexGlobal = 0;
    let borderInterval = null;
    let isLoading = false;
    
    const TIKTOK_USERNAME = "";
    tiktokLink.href = `https://www.tiktok.com/@${TIKTOK_USERNAME}`;
    
    // Toggle down/up menu
    let menuOpen = false;
    toggleDownUpBtn.addEventListener('click', () => {
        menuOpen = !menuOpen;
        if (menuOpen) {
            refreshMenu.classList.add('show');
            toggleDownUpBtn.innerHTML = '<i class="fas fa-chevron-down"></i>';
        } else {
            refreshMenu.classList.remove('show');
            toggleDownUpBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
        }
    });
    
    // Refresh collection
    async function handleRefresh() {
        if (isLoading) return;
        searchInput.value = "";
        searchStatus.innerHTML = "";
        dynamicCounter.innerHTML = `Total Koleksi: --`;
        galleryGrid.innerHTML = `<div style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-pulse"></i> Memuat ulang...</div>`;
        await loadMedia();
        filterById(null);
        // tutup menu setelah refresh
        menuOpen = false;
        refreshMenu.classList.remove('show');
        toggleDownUpBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
    }
    
    refreshCollectionBtn.addEventListener('click', handleRefresh);
    
    function updateDateTime() {
        const now = new Date();
        const wibTime = new Date(now.getTime() + (7 * 60 * 60 * 1000));
        const hours = wibTime.getUTCHours().toString().padStart(2, '0');
        const minutes = wibTime.getUTCMinutes().toString().padStart(2, '0');
        const seconds = wibTime.getUTCSeconds().toString().padStart(2, '0');
        const day = wibTime.getUTCDate().toString().padStart(2, '0');
        const month = (wibTime.getUTCMonth() + 1).toString().padStart(2, '0');
        const year = wibTime.getUTCFullYear();
        datetimeDisplay.innerHTML = `${hours}:${minutes}:${seconds} WIB · ${day}/${month}/${year}`;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);
    
    const fullName = "FebryJW🚀";
    let currentTyped = "";
    let timeoutId = null;
    let waitTimeout = null;
    
    function updateTypingDisplay() {
        typingNameSpan.innerText = currentTyped;
    }
    
    function startTypingCycle() {
        function typeNext() {
            if (currentTyped.length < fullName.length) {
                currentTyped = fullName.substring(0, currentTyped.length + 1);
                updateTypingDisplay();
                timeoutId = setTimeout(typeNext, 120);
            } else {
                if (waitTimeout) clearTimeout(waitTimeout);
                waitTimeout = setTimeout(() => startDeleting(), 3000);
            }
        }
        function startDeleting() {
            function deleteNext() {
                if (currentTyped.length > 0) {
                    currentTyped = currentTyped.substring(0, currentTyped.length - 1);
                    updateTypingDisplay();
                    timeoutId = setTimeout(deleteNext, 100);
                } else {
                    if (waitTimeout) clearTimeout(waitTimeout);
                    waitTimeout = setTimeout(() => startTypingCycle(), 3000);
                }
            }
            if (timeoutId) clearTimeout(timeoutId);
            deleteNext();
        }
        if (timeoutId) clearTimeout(timeoutId);
        if (waitTimeout) clearTimeout(waitTimeout);
        typeNext();
    }
    
    async function fileExists(url, timeoutMs = 400) {
        return new Promise((resolve) => {
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), timeoutMs);
            fetch(url, { method: 'HEAD', signal: controller.signal, cache: 'no-store' })
                .then(res => {
                    clearTimeout(tid);
                    resolve(res.ok);
                })
                .catch(() => {
                    clearTimeout(tid);
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = url;
                    setTimeout(() => { if (!img.complete) resolve(false); }, 200);
                });
        });
    }
    
    function getVideoThumbnail(videoSrc, callback) {
        const video = document.createElement('video');
        video.crossOrigin = "Anonymous";
        video.muted = true;
        video.preload = "metadata";
        video.onloadeddata = () => {
            video.currentTime = 0.5;
        };
        video.onseeked = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            callback(canvas.toDataURL());
            video.pause();
            video.src = '';
        };
        video.onerror = () => {
            callback(null);
        };
        video.src = videoSrc;
        video.load();
    }
    
    async function detectAllMedia() {
        const found = [];
        let i = START_INDEX;
        let consecutiveFails = 0;
        const MAX_CONSECUTIVE = 5;
        
        while (true) {
            let foundFile = null;
            for (const ext of EXTENSIONS) {
                const url = `${FOLDER_PATH}${i}${ext}`;
                const exists = await fileExists(url, 350);
                if (exists) {
                    foundFile = { index: i, src: url, type: ext === ".mp4" ? "video" : "image", special: (i === 5) };
                    break;
                }
            }
            if (foundFile) {
                found.push(foundFile);
                consecutiveFails = 0;
            } else {
                consecutiveFails++;
                if (consecutiveFails >= MAX_CONSECUTIVE && i > START_INDEX + 5) break;
            }
            i++;
            if (i > 500) break;
        }
        return found;
    }
    
    function startBorderRotation() {
        let isBlue = false;
        if (borderInterval) clearInterval(borderInterval);
        borderInterval = setInterval(() => {
            isBlue = !isBlue;
            const frames = document.querySelectorAll('.photo-frame');
            frames.forEach(frame => {
                if (isBlue) {
                    frame.classList.add('blue-border');
                } else {
                    frame.classList.remove('blue-border');
                }
            });
        }, 3000);
    }
    
    function renderGallery(mediaList) {
        if (!galleryGrid) return;
        galleryGrid.innerHTML = '';
        
        if (mediaList.length === 0) {
            galleryGrid.innerHTML = `<div class="empty-message"><p><i class="fas fa-images"></i> Koleksi Kosong</p></div>`;
            return;
        }
        
        mediaList.forEach(media => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            if (media.special) item.classList.add('special');
            
            const frame = document.createElement('div');
            frame.className = 'photo-frame';
            
            if (media.type === 'video') {
                const video = document.createElement('video');
                video.src = media.src;
                video.preload = "metadata";
                video.style.cursor = 'pointer';
                video.style.width = '100%';
                video.style.height = 'auto';
                getVideoThumbnail(media.src, (thumbnail) => {
                    if (thumbnail) {
                        video.poster = thumbnail;
                    }
                });
                frame.appendChild(video);
                frame.addEventListener('click', () => openModal(media.src, media.type, media.index));
            } else {
                const img = document.createElement('img');
                img.src = media.src;
                img.alt = `koleksi-${media.index}`;
                img.loading = "lazy";
                img.style.cursor = 'pointer';
                img.onerror = () => {
                    if (!frame.querySelector('.placeholder-img')) {
                        const ph = document.createElement('div');
                        ph.className = 'placeholder-img';
                        ph.innerHTML = `<i class="fas fa-image"></i><span>${media.index}</span>`;
                        img.style.display = 'none';
                        frame.appendChild(ph);
                    }
                };
                frame.appendChild(img);
                frame.addEventListener('click', () => openModal(media.src, media.type, media.index));
            }
            
            item.appendChild(frame);
            const cap = document.createElement('div');
            cap.className = 'caption-foto';
            cap.innerHTML = `<i class="fas fa-hashtag"></i> ${media.index}`;
            item.appendChild(cap);
            galleryGrid.appendChild(item);
        });
        
        startBorderRotation();
    }
    
    function openModal(src, type, idx) {
        currentModalSrcGlobal = src;
        currentModalTypeGlobal = type;
        currentModalIndexGlobal = idx;
        modalMedia.innerHTML = '';
        if (type === 'video') {
            const video = document.createElement('video');
            video.src = src;
            video.controls = true;
            video.autoplay = false;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '85vh';
            modalMedia.appendChild(video);
        } else {
            const img = document.createElement('img');
            img.src = src;
            img.alt = `Koleksi ${idx}`;
            modalMedia.appendChild(img);
        }
        modal.classList.add('active');
    }
    
    modalClose.addEventListener('click', () => {
        modal.classList.remove('active');
        modalMedia.innerHTML = '';
    });
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.remove('active');
            modalMedia.innerHTML = '';
        }
    });
    
    modalDownloadBtn.addEventListener('click', () => {
        fetch(currentModalSrcGlobal)
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `koleksi-${currentModalIndexGlobal}.${currentModalTypeGlobal === 'video' ? 'mp4' : 'jpg'}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            })
            .catch(() => {
                const a = document.createElement('a');
                a.href = currentModalSrcGlobal;
                a.download = `koleksi-${currentModalIndexGlobal}.${currentModalTypeGlobal === 'video' ? 'mp4' : 'jpg'}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
    });
    
    function filterById(searchId) {
        if (searchId === null || searchId === undefined || searchId === "" || isNaN(searchId)) {
            currentFiltered = [...allMedia];
            searchStatus.innerHTML = '';
        } else {
            const idNum = parseInt(searchId, 10);
            if (idNum < START_INDEX) {
                currentFiltered = [];
                searchStatus.innerHTML = '';
            } else {
                const found = allMedia.filter(m => m.index === idNum);
                currentFiltered = found;
                searchStatus.innerHTML = '';
            }
        }
        renderGallery(currentFiltered);
        if (allMedia.length > 0) {
            dynamicCounter.innerHTML = `Total Koleksi: ${allMedia.length}`;
        }
    }
    
    async function loadMedia() {
        if (isLoading) return;
        isLoading = true;
        
        const detected = await detectAllMedia();
        allMedia = detected;
        currentFiltered = [...allMedia];
        
        if (allMedia.length === 0) {
            dynamicCounter.innerHTML = `Total Koleksi: 0`;
            renderGallery([]);
        } else {
            dynamicCounter.innerHTML = `Total Koleksi: ${allMedia.length}`;
            renderGallery(currentFiltered);
        }
        
        isLoading = false;
    }
    
    async function startLoadingWithDelay() {
        let elapsed = 0;
        const totalDelay = 30;
        const progressInterval = setInterval(() => {
            elapsed += 0.1;
            let percent = Math.min((elapsed / totalDelay) * 100, 100);
            if (progressFill) progressFill.style.width = percent + '%';
            const remaining = Math.max(0, Math.ceil(totalDelay - elapsed));
            if (timerTextSpan) timerTextSpan.innerText = `${remaining} detik menuju koleksi`;
            if (elapsed >= totalDelay) clearInterval(progressInterval);
        }, 100);
        
        await new Promise(resolve => setTimeout(resolve, totalDelay * 1000));
        await loadMedia();
        
        setTimeout(() => { if (loadingOverlay) loadingOverlay.classList.add('hide'); }, 300);
    }
    
    function setupSearch() {
        searchBtn.addEventListener('click', () => {
            const val = searchInput.value.trim();
            if (val === "") filterById(null);
            else filterById(parseInt(val, 10));
        });
        resetBtn.addEventListener('click', () => {
            searchInput.value = "";
            filterById(null);
            searchStatus.innerHTML = "";
            dynamicCounter.innerHTML = `Total Koleksi: ${allMedia.length}`;
        });
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = searchInput.value.trim();
                if (val === "") filterById(null);
                else filterById(parseInt(val, 10));
            }
        });
    }
    
    async function init() {
        startTypingCycle();
        setupSearch();
        await startLoadingWithDelay();
    }
    
    document.addEventListener('DOMContentLoaded', () => { init(); });
</script>
