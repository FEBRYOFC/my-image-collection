<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>MY BEAUTIFUL - Koleksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="SANGE/style.css">
</head>
<body>
<div class="hero-glow"></div>
<div class="stars"></div>

<div class="refresh-toggle">
    <div class="toggle-downup" id="toggleDownUpBtn"><i class="fas fa-chevron-up"></i></div>
    <div class="refresh-menu" id="refreshMenu">
        <div class="refresh-menu-item" id="refreshCollectionBtn"><i class="fas fa-sync-alt"></i> Refresh</div>
        <div class="refresh-menu-item" id="musicBtn"><i class="fas fa-music"></i> Music</div>
        <div class="refresh-menu-item" style="justify-content: center; background: transparent; padding: 4px; pointer-events: none;"><span style="font-size: 0.65rem; color: #b77eff;">TEMA WARNA</span></div>
        <div class="theme-grid">
            <div class="theme-dot active" style="background: #b77eff;" data-glow="rgba(128, 0, 255, 0.22)" data-bdr="#b77eff" data-g1="#b77eff" data-g2="#7a3eff"></div>
            <div class="theme-dot" style="background: #0a84ff;" data-glow="rgba(10, 132, 255, 0.22)" data-bdr="#0a84ff" data-g1="#0a84ff" data-g2="#0055ff"></div>
            <div class="theme-dot" style="background: #ff0050;" data-glow="rgba(255, 0, 80, 0.22)" data-bdr="#ff0050" data-g1="#ff0050" data-g2="#aa0033"></div>
        </div>
    </div>
</div>

<div id="goToTop" class="go-to-top"><i class="fas fa-arrow-up"></i></div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card">
        <img class="loading-avatar" src="MY/loading.jpg" alt="loading" onerror="this.src='https://n.uguu.se/ztaVUtjW.jpeg'">
        <div class="loading-text">Membuka Halaman Koleksi...</div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="timer-text" id="timerText">30 detik menuju koleksi</div>
    </div>
</div>

<div id="mediaModal" class="modal">
    <div class="modal-tools">
        <button class="slide-btn active" id="slideOff"><i class="fas fa-pause"></i> Manual</button>
        <button class="slide-btn" id="slide5s"><i class="fas fa-play"></i> 5s</button>
        <button class="slide-btn" id="slide10s"><i class="fas fa-play"></i> 10s</button>
    </div>
    <button class="modal-close" id="modalClose">&times;</button>
    <button class="modal-nav modal-prev" id="modalPrev"><i class="fas fa-chevron-left"></i></button>
    
    <div class="modal-content-wrapper" id="modalWrapper">
        <div class="modal-content" id="modalContentInner">
            <div id="modalMedia"></div>
        </div>
        <button class="modal-download-btn" id="modalDownloadBtn"><i class="fas fa-download"></i> Download</button>
    </div>
    
    <button class="modal-nav modal-next" id="modalNext"><i class="fas fa-chevron-right"></i></button>
</div>

<div class="container">
    <div class="hero">
        <div class="judul-utama"><span class="my">MY</span> <span class="beautiful">BEAUTIFUL</span></div>
        <div class="koleksi-label">K O L E K S I</div>
        
        <div class="typing-area">
            <span class="madeby-label">Made By:</span>
            <div class="typing-wrapper">
                <div id="typingContainer"><span id="typingName"></span><span class="cursor-blink" id="cursorSpan">|</span></div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-label"><i class="fas fa-search"></i> cari koleksi berdasarkan nomor / ID</div>
            <div class="search-box">
                <input type="number" id="searchInput" placeholder="contoh: 1, 5, 42" min="1">
                <div class="search-buttons">
                    <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
                    <button id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
                </div>
            </div>
            
            <div class="filter-chips">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="image"><i class="fas fa-image"></i> Gambar</button>
                <button class="filter-btn" data-filter="video"><i class="fas fa-video"></i> Video</button>
                <button class="filter-btn" data-filter="fav" style="border-color: rgba(255,0,80,0.5);"><i class="fas fa-heart" style="color: #ff0050;"></i> Favorit</button>
            </div>
            <div id="searchStatus" class="search-status"></div>
        </div>
    </div>

    <div class="rocket-container">
        <div class="rocket rocket-left">🚀</div>
        <div class="rocket rocket-center">🚀</div>
        <div class="rocket rocket-right">🚀</div>
    </div>

    <div class="counter-wrapper">
        <div id="dynamicCounter" class="counter-info">Total Koleksi: 0</div>
        <div class="social-icons">
            <a class="social-icon" href="https://wa.me/6288808498725?text=" target="_blank">
                <div class="whatsapp-icon"><i class="fab fa-whatsapp"></i></div>
                <span class="social-label">Bot WhatsApp</span>
            </a>
            <a class="social-icon" href="#" id="tiktokLink" target="_blank">
                <div class="tiktok-icon"><i class="fab fa-tiktok"></i></div>
                <span class="social-label">TikTok</span>
            </a>
        </div>
    </div>

    <div class="all-collections-header">ALL COLLECTIONS</div>

    <div class="gallery-grid" id="galeriGrid"></div>

    <div class="custom-footer">
        <div class="footer-copyright">Copyright: FebryJW 🚀</div>
        <div class="footer-datetime" id="datetimeDisplay"></div>
    </div>
</div>

<script src="SANGE/script.js"></script>
</body>
</html>
